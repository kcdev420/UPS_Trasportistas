<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UPS - Portal Operativo</title>
    
    <link rel="icon" href="https://www.ups.com/favicon.ico" type="image/x-icon">
    
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: white; 
            overflow: hidden; 
           
        }
        
        .carousel-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; overflow: hidden; z-index: -1; }
        .carousel-track { display: flex; width: 400vw; height: 100vh; animation: slideCarousel 20s cubic-bezier(0.77, 0, 0.175, 1) infinite; }
        .carousel-track img { width: 100vw; height: 100vh; object-fit: cover; filter: brightness(0.35); }
        
        @keyframes slideCarousel {
            0%, 20% { transform: translateX(0); }
            25%, 45% { transform: translateX(-100vw); }
            50%, 70% { transform: translateX(-200vw); }
            75%, 95% { transform: translateX(-300vw); }
            100% { transform: translateX(0); }
        }
        
        .view-section { 
            display: none; position: absolute; top: 48%; left: 50%; transform: translate(-50%, -50%); 
            width: 90%; background-color: rgba(20, 25, 30, 0.85); padding: 35px 30px; 
            border: 1px solid #1e5b8a; box-shadow: 0 15px 40px rgba(0,0,0,0.9); 
            border-radius: 8px; text-align: center; box-sizing: border-box; 
            backdrop-filter: blur(8px); max-height: 90vh; overflow-y: auto;
        }
        
        .view-section.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -45%); } to { opacity: 1; transform: translate(-50%, -50%); } }

        #loginView { max-width: 400px; }
        #choferView { max-width: 450px; }
        #adminView { max-width: 900px; padding: 25px; }

        .logo { max-width: 70%; height: auto; max-height: 45px; margin-bottom: 25px; filter: brightness(0) invert(1); }
        
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 6px; font-size: 11px; color: #a1a1aa; text-transform: uppercase; letter-spacing: 1px;}
        
        select, input { 
            -webkit-appearance: none; appearance: none; width: 100%; padding: 12px 15px; 
            background-color: #2b2b2b; color: #ffffff; border: 1px solid #444; border-radius: 6px; 
            box-sizing: border-box; font-size: 14px; transition: 0.3s;
        }
        
        select { background-image: url('data:image/svg+xml;charset=US-ASCII,<svg xmlns="http://www.w3.org/2000/svg" width="292.4" height="292.4"><path fill="%23ffffff" d="M287 69.4a17.6 17.6 0 0 0-13-5.4H18.4c-5 0-9.3 1.8-12.9 5.4A17.6 17.6 0 0 0 0 82.2c0 5 1.8 9.3 5.4 12.9l128 127.9c3.6 3.6 7.8 5.4 12.8 5.4s9.2-1.8 12.8-5.4L287 95c3.5-3.5 5.4-7.8 5.4-12.8 0-5-1.9-9.2-5.4-12.8z"/></svg>'); background-repeat: no-repeat; background-position: right 15px top 50%; background-size: 10px auto; padding-right: 40px; }
        select:focus, input:focus { outline: none; border-color: #ffb500; background-color: #333;}
        input:disabled, select:disabled { background-color: #1a1a1a; color: #777; border-color: #333; cursor: not-allowed; }
        
        button { 
            width: 100%; padding: 14px; background-color: #ffb500; color: black; font-weight: 800; 
            border: none; border-radius: 6px; cursor: pointer; margin-top: 10px; font-size: 14px; 
            letter-spacing: 1px; transition: 0.3s; text-transform: uppercase;
        }
        button:hover { background-color: #e5a300; }
        .btn-cyan { background-color: #06b6d4; color: white; }
        .btn-cyan:hover { background-color: #0891b2; }
        .btn-green { background-color: #22c55e; color: white; }
        .btn-green:hover { background-color: #16a34a; }
        .btn-logout { background-color: transparent; border: 1px solid #555; color: #888; margin-top: 20px; padding: 10px;}
        .btn-logout:hover { background-color: rgba(255,255,255,0.05); color: white; border-color: white;}

        .admin-layout { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; margin-top: 20px; text-align: left; }
        @media (max-width: 768px) { .admin-layout { grid-template-columns: 1fr; } }

        .panel-box { background: rgba(0, 0, 0, 0.4); border: 1px solid #333; border-radius: 8px; overflow: hidden; }
        .panel-header { background: #2b82b3; color: white; padding: 10px 15px; font-size: 14px; font-weight: bold; }
        .panel-content { padding: 20px; }
        .grid-2-col { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .msg-box { margin-top: 15px; font-size: 13px; display: none; padding: 12px; border-radius: 6px; font-weight: bold; text-align: center; }
        .success { background-color: rgba(34, 197, 94, 0.1); color: #4ade80; border: 1px solid #22c55e; }
        .error { background-color: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid #ef4444; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }

        .footer { position: fixed; bottom: 10px; left: 0; right: 0; text-align: center; z-index: 1000; text-decoration: none; color: white; opacity: 0.5; }
        .footer h5 { font-weight: 300; letter-spacing: 1px; margin: 0; transition: 0.3s; font-size: 11px;}
        .footer:hover { opacity: 1; } .footer:hover h5 { color: #ffb500; }
    </style>
</head>
<body>
    
    <div class="carousel-bg">
        <div class="carousel-track">
            <img src="bg1.jpeg?v=1" alt="Fondo 1">
            <img src="bg2.jpeg?v=1" alt="Fondo 2">
            <img src="bg3.jpeg?v=1" alt="Fondo 3">
            <img src="bg4.jpeg?v=1" alt="Fondo 4">
        </div>
    </div>

    <div id="loginView" class="view-section active">
        <img src="https://assets.ups.com/adobe/assets/urn:aaid:aem:30ffa47d-9f45-496d-a58c-cf7349e0daef" alt="UPS Logo" class="logo">
        <h3 style="margin-top: 0; color: #ffb500; font-size: 16px; letter-spacing: 2px;">HUELLA DE CARBONO</h3>
        <p style="font-size: 12px; color: #888; margin-bottom: 25px;">Ingrese sus credenciales operativas</p>
        
        <form id="formLogin">
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" id="loginUser" required placeholder="Ej: admin / chofer" autocomplete="off">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="loginPass" required placeholder="••••••••">
            </div>
            <button type="submit">INICIAR SESIÓN</button>
        </form>
        <div id="loginError" class="msg-box error">Credenciales incorrectas</div>
    </div>

    <div id="choferView" class="view-section">
        <img src="https://assets.ups.com/adobe/assets/urn:aaid:aem:30ffa47d-9f45-496d-a58c-cf7349e0daef" alt="UPS Logo" class="logo">
        
        <form id="odometroForm">
            <div class="form-group">
                <label for="sede">1. Sede Operativa</label>
                <select id="sede" required>
                    <option value="">Seleccionar sede...</option>
                    <option value="GYE">Guayaquil (GYE)</option>
                    <option value="UIO12">Quito (UIO12)</option>
                    <option value="CUE">Cuenca (CUE)</option>
                    <option value="PVO">Portoviejo (PVO)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="placa">2. Placa del Vehículo</label>
                <select id="placa" required disabled>
                    <option value="">Primero selecciona una sede...</option>
                </select>
            </div>
            <div class="form-group">
                <label for="mes">Mes de Registro 2026</label>
                <select id="mes" required>
                    <option value="">Seleccionar mes...</option>
                    <option value="Enero">Enero</option>
                    <option value="Febrero">Febrero</option>
                    <option value="Marzo">Marzo</option>
                    <option value="Abril">Abril</option>
                    <option value="Mayo">Mayo</option>
                    <option value="Junio">Junio</option>
                    <option value="Julio">Julio</option>
                    <option value="Agosto">Agosto</option>
                    <option value="Septiembre">Septiembre</option>
                    <option value="Octubre">Octubre</option>
                    <option value="Noviembre">Noviembre</option>
                    <option value="Diciembre">Diciembre</option>
                </select>
            </div>
            <div class="form-group">
                <label for="kilometraje">Odómetro Final (km)</label>
                <input type="number" id="kilometraje" placeholder="Ej: 23456" required min="0">
            </div>
            <button type="submit" id="btnGuardarChofer">GUARDAR REGISTRO</button>
        </form>
        <button class="btn-logout" onclick="logout()">CERRAR SESIÓN</button>
        <div id="mensajeChofer" class="msg-box"></div>
    </div>

    <div id="adminView" class="view-section">
        <img src="https://assets.ups.com/adobe/assets/urn:aaid:aem:30ffa47d-9f45-496d-a58c-cf7349e0daef" alt="UPS Logo" class="logo" style="margin-bottom: 5px;">
        
        <div class="admin-layout">
            <div class="panel-box">
                <div class="panel-header" style="background: #2b82b3;">Importación Masiva</div>
                <div class="panel-content">
                    <button type="button" class="btn-cyan" onclick="descargarPlantilla()" style="margin-top: 0; margin-bottom: 20px;">
                        📥 1. Descargar Plantilla
                    </button>
                    
                    <label>2. Subir Archivo Completado</label>
                    <div style="display: flex; align-items: center; background: #2b2b2b; border: 1px solid #444; border-radius: 6px; padding: 5px;">
                        <input type="file" id="archivoCsv" accept=".csv, .xlsx" style="border: none; padding: 8px; width: 100%; font-size: 12px; background: transparent;">
                    </div>

                    <button class="btn-green" style="margin-top: 20px;" onclick="simularCargaMasiva()" id="btnMasivo">
                        ☁️ Procesar y Subir
                    </button>
                </div>
            </div>

            <div class="panel-box">
                <div class="panel-header" style="background: #2b82b3;">Registro Manual</div>
                <div class="panel-content">
                    <form id="adminForm">
                        <div class="grid-2-col">
                            <div class="form-group">
                                <label>Sede</label>
                                <select id="adminSede" required>
                                    <option value="">Seleccionar...</option>
                                    <option value="GYE">Guayaquil (GYE)</option>
                                    <option value="UIO12">Quito (UIO12)</option>
                                    <option value="CUE">Cuenca (CUE)</option>
                                    <option value="PVO">Portoviejo (PVO)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Fuente (Actividad)</label>
                                <select id="selectActividad" required>
                                    <option value="">Seleccionar...</option>
                                    <option value="Refrigerantes">Refrigerante</option>
                                    <option value="Diesel">Consumo de Diésel</option>
                                    <option value="Electricidad">Electricidad (Red Eléctrica)</option>
                                    <option value="PanelesSolares">Energía Solar (Paneles)</option>
                                    <option value="Reciclaje">Reciclaje (Cartón/Plástico)</option>
                                    <option value="Agua">Consumo de Agua Potable</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Fecha</label>
                                <input type="date" id="adminFecha" required>
                            </div>
                            <div class="form-group">
                                <label>Cantidad (Valor)</label>
                                <input type="number" id="adminCantidad" step="0.01" required placeholder="Ej: 1450.50">
                            </div>

                            <div class="form-group">
                                <label>Alcance (Scope)</label>
                                <input type="text" id="autoScope" disabled placeholder="-">
                            </div>
                            <div class="form-group">
                                <label>Unidad</label>
                                <input type="text" id="autoUnidad" disabled placeholder="-">
                            </div>
                            <div class="form-group" style="grid-column: span 2;">
                                <label>Factor de Emisión</label>
                                <input type="text" id="autoFactor" disabled placeholder="0.00">
                            </div>
                        </div>
                        <button type="submit" id="btnGuardarAdmin">💾 Guardar Registro</button>
                    </form>
                </div>
            </div>
        </div>

        <button class="btn-logout" onclick="logout()">Cerrar Sesión Operativa</button>
        <div id="mensajeAdmin" class="msg-box"></div>
    </div>

    <a href="https://kcdev420.github.io/CV/" target="_blank" class="footer">
        <h5>Design & Development by Kevin Mora © 2026</h5>
    </a>

    <script>
        // --- 1. LOGIN ---
        const loginView = document.getElementById('loginView');
        const choferView = document.getElementById('choferView');
        const adminView = document.getElementById('adminView');
        const loginError = document.getElementById('loginError');

        // Setear fecha actual por defecto en Admin
        document.getElementById('adminFecha').valueAsDate = new Date();

        document.getElementById('formLogin').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('loginUser').value.toLowerCase().trim();
            const pass = document.getElementById('loginPass').value;

            if (user === 'chofer' && pass === 'ups2026') {
                loginView.classList.remove('active'); choferView.classList.add('active'); loginError.style.display = 'none'; this.reset();
            } else if (user === 'admin' && pass === 'admin2026') {
                loginView.classList.remove('active'); adminView.classList.add('active'); loginError.style.display = 'none'; this.reset();
            } else {
                loginError.style.display = 'block';
            }
        });

        function logout() {
            choferView.classList.remove('active'); adminView.classList.remove('active'); loginView.classList.add('active');
        }

        // --- 2. CHOFER (RECOLECCIÓN) ---
       const placasPorSede = {
            "GYE": [
                "GPS0762", "PAB5011", "GB08325", "GBO9509", "GBP7251", "GSH9455", "GSN7162", "GQJ0383", "GSP8152", "GSF1491", 
                "GSJ2818", "GTI1945", "GTT9843", "GSJ3447", "GBO9033", "GTI1122", "GBP7876", "GBP5276", "ABD1120", "PAC1316", 
                "PAC1311", "GBN8565", "GBP1979", 
                "GBN7346 (Propia)", "GPV0667 (Propia)", "GBN7347 (Propia)", "GBN7355 (Propia)", "GBN7354 (Propia)", "PBL4410 (Propia)", "GQV0171 (Propia)", 
                "IAI3663 (Esporádico)", "PDV4412 (Esporádico)", "PFJ2653 (Esporádico)", "PFK5718 (Esporádico)", "PAD1991 (Esporádico)", "PDV1167 (Esporádico)", 
                "XBC2680 (Esporádico)", "PFE5603 (Esporádico)", "PFK1506 (Esporádico)", "PAB8192 (Esporádico)", "PAE3545 (Esporádico)", "PAD1851 (Esporádico)", 
                "PAD1913 (Esporádico)", "PFO1593 (Esporádico)", "GBO5004 (Esporádico)", "AAY0116 (Esporádico)", "AFU0919 (Esporádico)", "PZN0313 (Esporádico)", 
                "GIR0872 (Esporádico)", "GSB3779 (Esporádico)", "GBN8358 (Esporádico)", "POS0267 (Esporádico)", "GLL0927 (Esporádico)", "GBO2418 (Esporádico)"
            ],
            "UIO12": [
                "PAB7359", "PAE3205", "PAE2148", "PCD4438", "PAB6124", "PDP6284", "PBQ7618", "PAE1223", "PAB3042", "GSY1085", 
                "UAA1265", "IAA1766", "PAB8600", "TAA6743", "TBL5420", "TBJ4630", "PDZ5999", "GST2063", "IBC3856", "IBC8439", 
                "KAA1441", "PAB1167", "PAE1084", "PAE1034", "PFD3522", "PBX9330", "PFD4943", "PFL3177", "PFI3464", "PCG3409", 
                "PDV1181", "PFB8085", "PAC5731", "PCX5199", "PAA1287", "PAA2425", "PAA2598", "PAB2944", "PAB3107", "PAB5645", 
                "PAB7796", "PAD1325", "PUG838", "PDR4972", "PDI2325", "PFN2110", "PCR7979", 
                "GBN7342 (Propia)", "PCI3402 (Propia)", "PCI3401 (Propia)", "GBN3377 (Propia)"
            ],
            "CUE": [
                "PCC 6300", "ABF9931", "AAA6008", "ABF2591", "ABB2689", "AFJ0111", "AFS0995", "ABM4626", "ABM4625", "AFR0708"
            ],
            "PVO": [
                "GTA6924", "GBP2057", "GBP5496", "PCQ7816", "MAA8189"
            ]
        };

        const selectSede = document.getElementById('sede');
        const selectPlaca = document.getElementById('placa');

        selectSede.addEventListener('change', function() {
            const sede = this.value;
            selectPlaca.innerHTML = '<option value="">Seleccionar placa...</option>';
            if (sede && placasPorSede[sede]) {
                selectPlaca.disabled = false;
                placasPorSede[sede].forEach(p => selectPlaca.innerHTML += `<option value="${p.split(' ')[0]}">${p}</option>`);
            } else { selectPlaca.disabled = true; }
        });

        // FETCH DEL CHOFER
        document.getElementById('odometroForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnGuardarChofer');
            const msj = document.getElementById('mensajeChofer');

            const datos = {
                sede: selectSede.value,
                placa: selectPlaca.value, 
                mes: document.getElementById('mes').value,
                kilometraje: Number(document.getElementById('kilometraje').value),
                fecha_ingreso: new Date().toISOString()
            };

            btn.textContent = "GUARDANDO..."; btn.disabled = true;
            
            try {
                const response = await fetch('/api/guardar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });
                
                if (response.ok) {
                    msj.textContent = "✔ Registro guardado con éxito.";
                    msj.className = "msg-box success"; msj.style.display = "block";
                    this.reset(); selectPlaca.innerHTML = '<option value="">Primero selecciona una sede...</option>'; selectPlaca.disabled = true;
                } else {
                    const errorText = await response.text();
                    console.error("Error del servidor:", errorText);
                    throw new Error('El servidor rechazó la conexión.');
                }
            } catch (error) {
                console.error("Fetch falló:", error);
                msj.textContent = "✖ Error de red o servidor. (Revisa consola F12)";
                msj.className = "msg-box error"; msj.style.display = "block";
            } finally {
                btn.textContent = "GUARDAR REGISTRO"; btn.disabled = false;
                setTimeout(() => msj.style.display = 'none', 5000); 
            }
        });

        // --- 3. ADMIN (NUEVAS ACTIVIDADES Y CEREBRO) ---
        const diccionarioActividades = {
            "Refrigerantes": { scope: "1", unidad: "kg", factor: "1430.00" },
            "Diesel": { scope: "1", unidad: "Galones", factor: "10.18" },
            "Electricidad": { scope: "2", unidad: "kWh", factor: "0.245" },
            "PanelesSolares": { scope: "2", unidad: "kWh", factor: "-0.245" }, // Factor negativo
            "Reciclaje": { scope: "3", unidad: "kg", factor: "-0.85" }, // Factor negativo
            "Agua": { scope: "3", unidad: "m3", factor: "0.344" },
            
        };

        const selectActividad = document.getElementById('selectActividad');
        const inScope = document.getElementById('autoScope');
        const inUnidad = document.getElementById('autoUnidad');
        const inFactor = document.getElementById('autoFactor');

        selectActividad.addEventListener('change', function() {
            const act = this.value;
            if (act && diccionarioActividades[act]) {
                inScope.value = diccionarioActividades[act].scope;
                inUnidad.value = diccionarioActividades[act].unidad;
                inFactor.value = diccionarioActividades[act].factor;
            } else {
                inScope.value = ""; inUnidad.value = ""; inFactor.value = "";
            }
        });

        // FETCH DEL ADMIN
        document.getElementById('adminForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnGuardarAdmin');
            const msj = document.getElementById('mensajeAdmin');

            const factorMatematico = Number(inFactor.value);
            const cantidadIngresada = Number(document.getElementById('adminCantidad').value);
            
            // Calculamos el CO2e al instante para mandarlo listo a la BD
            const calculoCo2e = cantidadIngresada * factorMatematico;

            const datosAdmin = {
                sede: document.getElementById('adminSede').value,
                actividad: selectActividad.value,
                fecha: document.getElementById('adminFecha').value,
                cantidad: cantidadIngresada,
                scope: Number(inScope.value),
                unidad: inUnidad.value,
                factor: factorMatematico,
                co2e_kg: calculoCo2e, // Enviamos el cálculo neto (positivo o negativo)
                timestamp: new Date().toISOString()
            };

            btn.textContent = "INJECTANDO..."; btn.disabled = true;
            
            try {
                // RUTA NUEVA: Necesitarás crear app/api/admin-manual/route.js para que esto funcione
                const response = await fetch('/api/admin-manual', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datosAdmin)
                });
                
                if (response.ok) {
                    msj.textContent = `✔ ¡Éxito! Impacto inyectado: ${calculoCo2e.toFixed(2)} kg CO2e`;
                    msj.className = "msg-box success"; msj.style.display = "block";
                    this.reset();
                    inScope.value = ""; inUnidad.value = ""; inFactor.value = "";
                    document.getElementById('adminFecha').valueAsDate = new Date();
                } else {
                    const errorText = await response.text();
                    console.error("Error BD Admin:", errorText);
                    throw new Error('Error al guardar en MongoDB');
                }
            } catch (error) {
                console.error("Fetch Admin falló:", error);
                msj.textContent = "✖ Creado localmente (La API /api/admin-manual aún no existe).";
                msj.className = "msg-box error"; msj.style.display = "block";
            } finally {
                btn.textContent = "💾 GUARDAR REGISTRO"; btn.disabled = false;
                setTimeout(() => msj.style.display = 'none', 6000);
            }
        });

        // --- EXCEL TEMPLATE ---
        function descargarPlantilla() {
            const headers = "fecha,sede,scope,tipo_actividad,cantidad,unidad,factor_emision,co2e_kg\n";
            const example1 = "2026-03-01,GYE,2,Electricidad,1500.50,kWh,0.245,367.62\n";
            const example2 = "2026-03-05,UIO12,1,Refrigerantes,2.5,kg,1430,3575.00\n";
            const example3 = "2026-03-10,CUE,2,PanelesSolares,500,kWh,-0.245,-122.50\n";
            
            const csvContent = "data:text/csv;charset=utf-8," + headers + example1 + example2 + example3;
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "UPS_Matriz_Impacto_Ambiental.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function simularCargaMasiva() {
            const file = document.getElementById('archivoCsv').files[0];
            const msj = document.getElementById('mensajeAdmin');
            if(!file) {
                msj.textContent = "✖ Selecciona un archivo Excel/CSV primero.";
                msj.className = "msg-box error"; msj.style.display = "block";
                setTimeout(() => msj.style.display = 'none', 3000);
                return;
            }
            alert("El módulo de backend para procesar Excel se implementará en la siguiente fase.");
        }
    </script>
</body>
</html>
