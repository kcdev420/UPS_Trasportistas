<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Odómetro - UPS GHG Tracker</title>
    <style>
        /* Estilos globales */
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #0a0a0a; 
            color: white; 
        }
        
        /* Animación del fondo (Brillo arreglado) */
        @keyframes slideShow {
            0% { background-image: url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?auto=format&fit=crop&w=2000&q=80'); }
            33% { background-image: url('https://images.unsplash.com/photo-1532187863486-abf9dbad1b69?auto=format&fit=crop&w=2000&q=80'); }
            66% { background-image: url('https://images.unsplash.com/photo-1614935151651-0bea6508db6b?auto=format&fit=crop&w=2000&q=80'); }
            100% { background-image: url('https://images.unsplash.com/photo-1565891741441-64926e441838?auto=format&fit=crop&w=2000&q=80'); }
        }
        .login-bg { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background-size: cover; background-position: center; 
            animation: slideShow 15s infinite; 
            filter: brightness(0.60); /* Subido a 0.60 para que las imágenes destaquen */
            z-index: -1; 
        }
        
        /* Contenedor principal RESPONSIVE */
        .container { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 90%; /* Se adapta en celulares */
            max-width: 380px; /* Tamaño máximo en PC */
            background-color: rgba(26, 26, 26, 0.95); /* Leve transparencia para ver el fondo */
            padding: 30px 25px; 
            border: 1px solid #007bff; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); 
            border-radius: 8px; 
            text-align: center; 
            box-sizing: border-box; /* Evita que el padding rompa la pantalla */
        }
        .logo { height: 50px; margin-bottom: 20px; filter: brightness(0) invert(1); max-width: 100%; }
        
        /* Estilos de Formulario adaptados para pantallas táctiles */
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-size: 12px; color: #cccccc; text-transform: uppercase; letter-spacing: 0.5px;}
        select, input { 
            width: 100%; padding: 14px; 
            background-color: #2b2b2b; color: #ffffff; 
            border: 1px solid #444444; border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 16px; /* 16px previene el auto-zoom en iPhone */
        }
        select:focus, input:focus { outline: none; border-color: #007bff; box-shadow: 0 0 5px rgba(0,123,255,0.5);}
        select:disabled { background-color: #1a1a1a; color: #555; cursor: not-allowed; border-color: #333; }
        
        /* Botón */
        button { 
            width: 100%; padding: 15px; 
            background-color: #ffb500; color: black; 
            font-weight: bold; border: none; border-radius: 6px; 
            cursor: pointer; margin-top: 10px; font-size: 15px; letter-spacing: 1px; transition: 0.3s; 
        }
        button:hover { background-color: #e5a300; transform: translateY(-2px); }
        button:disabled { background-color: #555; color: #888; cursor: not-allowed; transform: none; }
        
        /* Alertas */
        #mensaje { margin-top: 15px; font-size: 14px; display: none; padding: 12px; border-radius: 6px; font-weight: bold; }
        .success { background-color: rgba(40, 167, 69, 0.2); color: #28a745; border: 1px solid #28a745; }
        .error { background-color: rgba(220, 53, 69, 0.2); color: #dc3545; border: 1px solid #dc3545; }

        /* Footer centrado para celulares */
        .footer { position: fixed; bottom: 15px; left: 0; right: 0; text-align: center; z-index: 1000; text-decoration: none; color: white; opacity: 0.6; }
        .footer h5 { font-weight: 300; letter-spacing: 1px; margin: 0; transition: 0.3s; font-size: 12px;}
        .footer:hover { opacity: 1; }
        .footer:hover h5 { color: #ffb500; transform: scale(1.02); }

        /* Ajustes extra para teléfonos muy pequeños */
        @media (max-width: 360px) {
            .container { padding: 25px 15px; }
            .logo { height: 40px; }
            select, input { padding: 12px; }
        }
    </style>
</head>
<body>
    <div class="login-bg"></div>

    <div class="container">
        <img src="https://assets.ups.com/adobe/assets/urn:aaid:aem:30ffa47d-9f45-496d-a58c-cf7349e0daef" alt="UPS Logo" class="logo">
        
        <form id="odometroForm">
            <div class="form-group">
                <label for="sede">1. Sede Operativa</label>
                <select id="sede" required>
                    <option value="">Seleccionar sede...</option>
                    <option value="GYE">Guayaquil (GYE)</option>
                    <option value="UIO-ITP">Quito (UIO-ITP)</option>
                    <option value="CUE">Cuenca (CUE)</option>
                    <option value="PVO">PVO</option>
                </select>
            </div>

            <div class="form-group">
                <label for="placa">2. Placa del Vehículo</label>
                <select id="placa" required disabled>
                    <option value="">Primero selecciona una sede...</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="mes">Mes de Registro</label>
                <select id="mes" required>
                    <option value="">Seleccionar mes...</option>
                    <option value="Enero">Enero</option>
                    <option value="Febrero">Febrero</option>
                    <option value="Marzo">Marzo</option>
                    <option value="Abril">Abril</option>
                    <option value="Mayo">Mayo</option>
                    <option value="Junio">Junio</option>
                    <option value="Julio">Julio</option>
                    <option value="Agosto">Agosto</option>
                    <option value="Septiembre">Septiembre</option>
                    <option value="Octubre">Octubre</option>
                    <option value="Noviembre">Noviembre</option>
                    <option value="Diciembre">Diciembre</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="kilometraje">Odómetro Final (km)</label>
                <input type="number" id="kilometraje" placeholder="Ej: 23456" required min="0">
            </div>
            
            <button type="submit" id="btnGuardar">GUARDAR REGISTRO</button>
        </form>
        
        <div id="mensaje"></div>
    </div>

    <a href="https://kcdev420.github.io/CV/" target="_blank" class="footer">
        <h5>Design & Development by Kevin Mora © 2026</h5>
    </a>

    <script>
        const placasPorSede = {
            "GYE": [
                "GPS0762", "PAB5011", "GB08325", "GBO9509", "GBP7251", "GSH9455", "GSN7162", "GQJ0383", "GSP8152", "GSF1491", 
                "GSJ2818", "GTI1945", "GTT9843", "GSJ3447", "GBO9033", "GTI1122", "GBP7876", "GBP5276", "ABD1120", "PAC1316", 
                "PAC1311", "GBN8565", "GBP1979", 
                "GBN7346 (Propia)", "GPV0667 (Propia)", "GBN7347 (Propia)", "GBN7355 (Propia)", "GBN7354 (Propia)", "PBL4410 (Propia)", "GQV0171 (Propia)", 
                "IAI3663 (Esporádico)", "PDV4412 (Esporádico)", "PFJ2653 (Esporádico)", "PFK5718 (Esporádico)", "PAD1991 (Esporádico)", "PDV1167 (Esporádico)", 
                "XBC2680 (Esporádico)", "PFE5603 (Esporádico)", "PFK1506 (Esporádico)", "PAB8192 (Esporádico)", "PAE3545 (Esporádico)", "PAD1851 (Esporádico)", 
                "PAD1913 (Esporádico)", "PFO1593 (Esporádico)", "GBO5004 (Esporádico)", "AAY0116 (Esporádico)", "AFU0919 (Esporádico)", "PZN0313 (Esporádico)", 
                "GIR0872 (Esporádico)", "GSB3779 (Esporádico)", "GBN8358 (Esporádico)", "POS0267 (Esporádico)", "GLL0927 (Esporádico)", "GBO2418 (Esporádico)"
            ],
            "UIO-ITP": [
                "PAB7359", "PAE3205", "PAE2148", "PCD4438", "PAB6124", "PDP6284", "PBQ7618", "PAE1223", "PAB3042", "GSY1085", 
                "UAA1265", "IAA1766", "PAB8600", "TAA6743", "TBL5420", "TBJ4630", "PDZ5999", "GST2063", "IBC3856", "IBC8439", 
                "KAA1441", "PAB1167", "PAE1084", "PAE1034", "PFD3522", "PBX9330", "PFD4943", "PFL3177", "PFI3464", "PCG3409", 
                "PDV1181", "PFB8085", "PAC5731", "PCX5199", "PAA1287", "PAA2425", "PAA2598", "PAB2944", "PAB3107", "PAB5645", 
                "PAB7796", "PAD1325", "PUG838", "PDR4972", "PDI2325", "PFN2110", "PCR7979", 
                "GBN7342 (Propia)", "PCI3402 (Propia)", "PCI3401 (Propia)", "GBN3377 (Propia)"
            ],
            "CUE": [
                "PCC 6300", "ABF9931", "AAA6008", "ABF2591", "ABB2689", "AFJ0111", "AFS0995", "ABM4626", "ABM4625", "AFR0708"
            ],
            "PVO": [
                "GTA6924", "GBP2057", "GBP5496", "PCQ7816", "MAA8189"
            ]
        };

        const selectSede = document.getElementById('sede');
        const selectPlaca = document.getElementById('placa');

        selectSede.addEventListener('change', function() {
            const sedeElegida = this.value;
            selectPlaca.innerHTML = '<option value="">Seleccionar placa...</option>';
            
            if (sedeElegida && placasPorSede[sedeElegida]) {
                selectPlaca.disabled = false;
                placasPorSede[sedeElegida].forEach(placaTexto => {
                    const option = document.createElement('option');
                    option.value = placaTexto.split(' ')[0]; 
                    option.textContent = placaTexto;
                    selectPlaca.appendChild(option);
                });
            } else {
                selectPlaca.disabled = true;
                selectPlaca.innerHTML = '<option value="">Primero selecciona una sede...</option>';
            }
        });

        document.getElementById('odometroForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const btn = document.getElementById('btnGuardar');
            const divMensaje = document.getElementById('mensaje');

            const datos = {
                sede: selectSede.value,
                placa: selectPlaca.value, 
                mes: document.getElementById('mes').value,
                kilometraje: Number(document.getElementById('kilometraje').value),
                fecha_ingreso: new Date().toISOString()
            };

            btn.textContent = "GUARDANDO...";
            btn.disabled = true;

            try {
                const response = await fetch('/api/guardar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });

                if (response.ok) {
                    divMensaje.textContent = "✔ Registro guardado con éxito";
                    divMensaje.className = "success";
                    divMensaje.style.display = "block";
                    document.getElementById('odometroForm').reset();
                    selectPlaca.innerHTML = '<option value="">Primero selecciona una sede...</option>';
                    selectPlaca.disabled = true;
                } else {
                    throw new Error('Error en el servidor');
                }
            } catch (error) {
                divMensaje.textContent = "✖ Hubo un error de conexión.";
                divMensaje.className = "error";
                divMensaje.style.display = "block";
            } finally {
                btn.textContent = "GUARDAR REGISTRO";
                btn.disabled = false;
                setTimeout(() => divMensaje.style.display = 'none', 5000); 
            }
        });
    </script>
</body>
</html>
